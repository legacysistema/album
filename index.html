<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>Rodrigo Costa Fotografia — Online Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --stage-1: #332d22;
      --stage-2: #100e0a;
      --paper: #fdfcf8;
      --ink: #2b2114;
      --brass: #ab8a4c;
      --brass-light: #d9c9a3;
      --danger: #8c4a3a;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    body {
      background: radial-gradient(ellipse 150% 90% at 50% -15%, var(--stage-1) 0%, #1c1812 55%, var(--stage-2) 100%);
      font-family: 'Space Mono', monospace;
      color: var(--brass-light);
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stage {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0;
      margin: 0;
      gap: 6px;
    }
    .album-container {
      flex: 1 1 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      min-height: 0;
      padding: 4px;
    }
    .book-wrapper {
      position: relative;
      /* perspective e dimensões definidas via JS */
      filter: drop-shadow(0 32px 40px rgba(0,0,0,0.55)) drop-shadow(0 6px 10px rgba(0,0,0,0.35));
    }
    .book-wrapper::after {
      content: '';
      position: absolute; left: 6%; right: 6%; bottom: -16px; height: 20px;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 72%);
      filter: blur(5px);
      z-index: -1;
    }
    .book {
      position: relative; width: 100%; height: 100%;
      transform-style: preserve-3d; -webkit-transform-style: preserve-3d;
    }
    .page {
      /* Ocupa a metade DIREITA do livro (da lombada até a borda direita).
         Ao girar -180deg em torno da própria borda esquerda (= lombada,
         transform-origin: left center), a página vira e passa a cobrir
         a metade ESQUERDA — é assim que as duas páginas ficam visíveis
         ao mesmo tempo, como um álbum aberto de verdade. */
      position: absolute; top: 0; left: 50%; width: 50%; height: 100%;
      transform-style: preserve-3d; -webkit-transform-style: preserve-3d;
      transform-origin: left center;
      transition: transform 0.95s cubic-bezier(.64,.06,.34,1);
      will-change: transform;
      cursor: pointer;
    }
    .face {
      position: absolute; inset: 0;
      background: var(--paper);
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.06);
    }
    .face.back { transform: rotateY(180deg); }
    .page-inner {
      width: 100%; height: 100%;
      background-size: cover !important;
      background-position: center !important;
      background-repeat: no-repeat !important;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      position: relative;
    }
    .plate-num {
      position: absolute;
      bottom: 6px;
      right: 8px;
      font-family: 'Space Mono', monospace;
      font-size: clamp(9px, 1.15vw, 13px);
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.35);
      padding: 1px 6px;
      border-radius: 2px;
    }
    .plate-num.blank {
      color: rgba(43,33,20,0.25);
      background: transparent;
    }

    /* Navegação – posicionamento via JS */
    .nav-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      border-radius: 3px;
      border: 1px solid rgba(171,138,76,0.55);
      background: rgba(16,14,10,0.35);
      color: var(--brass-light);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
      z-index: 50;
      padding: 0;
      /* tamanho e posição definidos via JS */
    }
    .nav-btn:hover:not(:disabled) { background: rgba(171,138,76,0.22); border-color: var(--brass); }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }
    .nav-btn:focus-visible { outline: 2px solid var(--brass-light); outline-offset: 2px; }
    .nav-btn .arrow { width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; }
    .nav-prev .arrow { border-right: 8px solid currentColor; margin-right: -2px; }
    .nav-next .arrow { border-left: 8px solid currentColor; margin-left: -2px; }

    .counter {
      font-family: 'Space Mono', monospace;
      font-size: clamp(11px, 1.3vw, 14px);
      letter-spacing: 0.22em;
      color: var(--brass);
      flex: 0 0 auto;
      margin: 0;
      padding: 2px 0;
    }

    /* Mesa de Montagem – sem limites de largura fixa */
    .tray {
      width: 100%;
      max-width: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0));
      border: 1px solid rgba(171,138,76,0.35);
      border-radius: 4px;
      padding: 12px 16px 16px;
      flex: 0 0 auto;
      margin: 0;
    }
    .tray-title {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: clamp(11px, 1.3vw, 13px);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brass);
      margin-bottom: 8px;
    }
    .tray-hint {
      font-family: 'Space Mono', monospace;
      font-size: clamp(10px, 1.1vw, 12px);
      color: rgba(217,201,163,0.55);
      margin: 0 0 10px;
    }
    .tray-grid {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      gap: 14px;
      align-items: start;
    }
    @media (max-width: 760px) {
      .tray-grid { grid-template-columns: 1fr; }
      .link-result { flex-direction: column; }
    }
    .slot-label-row {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 6px;
    }
    .slot-name {
      font-family: 'Space Mono', monospace;
      font-size: clamp(10px, 1.2vw, 12px);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--brass-light);
    }
    .slot-count {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: rgba(217,201,163,0.5);
    }
    .dropzone, .filmstrip {
      border: 1px dashed rgba(171,138,76,0.5);
      border-radius: 3px;
      background: rgba(16,14,10,0.3);
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    .dropzone:hover, .dropzone.drag-over,
    .filmstrip:hover, .filmstrip.drag-over {
      border-color: var(--brass);
      background: rgba(171,138,76,0.1);
    }
    .dropzone:focus-visible, .filmstrip:focus-visible {
      outline: 2px solid var(--brass-light);
      outline-offset: 2px;
    }
    .dropzone {
      position: relative;
      min-height: 76px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px;
      overflow: hidden;
      padding: 8px;
      text-align: center;
    }
    .dropzone.filled { border-style: solid; }
    .dz-icon { width: 20px; height: 20px; fill: none; stroke: rgba(217,201,163,0.6); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .dz-text { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.03em; color: rgba(217,201,163,0.55); }
    .dz-thumb {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      display: flex; flex-direction: column;
    }
    .dz-thumb::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(0,0,0,0.6) 100%);
    }
    .dz-thumb-label {
      position: relative; z-index: 1; margin-top: auto;
      font-family: 'Space Mono', monospace; font-size: 10px; color: #fff; letter-spacing: 0.03em;
      padding: 4px 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .dz-remove, .frame-remove {
      position: absolute; top: 4px; right: 4px; z-index: 2;
      width: 18px; height: 18px; border-radius: 2px;
      background: rgba(16,14,10,0.75); border: 1px solid rgba(217,201,163,0.4);
      color: var(--brass-light); font-size: 12px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; padding: 0;
    }
    .dz-remove:hover, .frame-remove:hover { background: var(--danger); border-color: var(--danger); color: #fff; }
    .dz-remove:focus-visible, .frame-remove:focus-visible, .link-btn:focus-visible {
      outline: 2px solid var(--brass-light); outline-offset: 2px;
    }

    .filmstrip {
      display: flex; flex-wrap: wrap; gap: 8px;
      min-height: 76px;
      padding: 8px;
      align-content: flex-start;
    }
    .filmstrip:empty::before {
      content: 'clique ou arraste as fotos das páginas';
      margin: auto;
      font-family: 'Space Mono', monospace; font-size: 10px; color: rgba(217,201,163,0.5);
      text-align: center;
    }
    .frame {
      position: relative; width: 48px; height: 48px; border-radius: 2px; overflow: hidden;
      background-size: cover; background-position: center;
      box-shadow: 0 0 0 1px rgba(171,138,76,0.4);
      flex: 0 0 auto;
    }
    .frame-num {
      position: absolute; left: 2px; bottom: 2px;
      font-family: 'Space Mono', monospace; font-size: 8px; color: #fff;
      background: rgba(0,0,0,0.55); padding: 0 3px; border-radius: 1px;
    }
    .frame-remove { top: 2px; right: 2px; width: 15px; height: 15px; font-size: 10px; }

    .slot-actions { margin-top: 6px; display: flex; justify-content: flex-end; }
    .link-btn {
      background: none; border: none; padding: 0; cursor: pointer;
      font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.03em;
      color: rgba(217,201,163,0.55); text-decoration: underline;
    }
    .link-btn:hover { color: var(--brass-light); }

    .tray-footer {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(171,138,76,0.25);
    }
    .btn-primary {
      width: 100%;
      padding: 10px 14px;
      border-radius: 3px;
      border: 1px solid rgba(171,138,76,0.55);
      background: rgba(171,138,76,0.12);
      color: var(--brass-light);
      font-family: 'Space Mono', monospace;
      font-size: clamp(10px, 1.2vw, 12px);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .btn-primary:hover:not(:disabled) { background: rgba(171,138,76,0.22); border-color: var(--brass); }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }
    .btn-primary:focus-visible { outline: 2px solid var(--brass-light); outline-offset: 2px; }
    .link-result {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .link-result input {
      flex: 1;
      min-width: 0;
      background: rgba(16,14,10,0.4);
      border: 1px solid rgba(171,138,76,0.4);
      border-radius: 3px;
      color: var(--brass-light);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 8px 10px;
    }
    .link-result button {
      flex: 0 0 auto;
      background: rgba(171,138,76,0.15);
      border: 1px solid rgba(171,138,76,0.5);
      border-radius: 3px;
      color: var(--brass-light);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 0 14px;
      cursor: pointer;
    }
    .link-result button:hover { background: rgba(171,138,76,0.28); }
    .link-status {
      margin-top: 6px;
      min-height: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.02em;
      color: rgba(217,201,163,0.6);
    }
    .link-status.error { color: var(--danger); }

    .modo-visualizacao .tray { display: none; }
    .modo-visualizacao .counter { display: none; }

    /* ==================================================================
       VISUALIZADOR DO CLIENTE — sempre em tela cheia, sempre "deitado".
       Nada aqui toca a animação 3D, o virar de páginas ou o JS de
       navegação: apenas o CONTAINER é redimensionado/posicionado.
       ================================================================== */
    .modo-visualizacao html,
    .modo-visualizacao body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #100e0a;
    }
    .modo-visualizacao .stage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      padding: 0;
      margin: 0;
      gap: 0;
    }
    .modo-visualizacao .album-container {
      width: 100%;
      height: 100%;
      padding: 0;
    }
    /* Celular na mão em pé (retrato): giramos a "mesa" inteira 90°
       para que o álbum já apareça deitado, preenchendo a tela toda.
       Quando o usuário gira o aparelho para paisagem, o navegador
       já entrega width/height deitados e a rotação é removida. */
    @media (orientation: portrait) {
      .modo-visualizacao .stage {
        width: 100vh;
        height: 100vw;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(90deg);
        transform-origin: center center;
      }
    }

    .album-erro {
      margin-top: 24px;
      max-width: 320px;
      padding: 20px;
      border: 1px solid rgba(171,138,76,0.4);
      border-radius: 4px;
      background: rgba(16,14,10,0.3);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      color: var(--brass-light);
      text-align: center;
    }

    /* ==================================================================
       LOGIN DO EDITOR — protege a Mesa de Montagem com o usuário/senha
       criado no Supabase Auth. O link do cliente (?a=token) NUNCA passa
       por aqui: continua público, como sempre foi.
       ================================================================== */
    body.aguardando-login .stage { display: none; }
    .login-gate {
      display: none;
      position: fixed; inset: 0;
      z-index: 1000;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse 150% 90% at 50% -15%, var(--stage-1) 0%, #1c1812 55%, var(--stage-2) 100%);
      padding: 24px;
    }
    body.aguardando-login .login-gate { display: flex; }
    .login-card {
      width: 100%;
      max-width: 360px;
      background: rgba(16,14,10,0.55);
      border: 1px solid rgba(171,138,76,0.35);
      border-radius: 10px;
      padding: 34px 28px 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-logo { width: 150px; height: auto; margin: 0 auto 16px; display: block; }
    .login-subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: rgba(217,201,163,0.6);
      margin-bottom: 22px;
      line-height: 1.5;
    }
    .login-form { text-align: left; }
    .login-label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brass);
      margin: 14px 0 6px;
    }
    .login-input {
      width: 100%;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(171,138,76,0.4);
      border-radius: 5px;
      color: var(--brass-light);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      padding: 11px 12px;
    }
    .login-input:focus { outline: none; border-color: var(--brass); }
    .login-btn {
      width: 100%;
      margin-top: 22px;
      padding: 12px 14px;
      border-radius: 6px;
      border: none;
      background: linear-gradient(180deg, #f0c24b, #d9a63a);
      color: #241c0f;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(217,166,58,0.35);
      transition: filter 0.2s ease, opacity 0.2s ease;
    }
    .login-btn:hover:not(:disabled) { filter: brightness(1.06); }
    .login-btn:disabled { opacity: 0.6; cursor: default; }
    .login-btn:focus-visible { outline: 2px solid var(--brass-light); outline-offset: 2px; }
    .login-error {
      margin-top: 12px;
      min-height: 14px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--danger);
      text-align: center;
    }
    .logout-btn {
      display: block;
      margin: 10px auto 0;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.03em;
      color: rgba(217,201,163,0.55);
      text-decoration: underline;
    }
    .logout-btn:hover { color: var(--brass-light); }

    @media (prefers-reduced-motion: reduce) {
      .page { transition: none; }
      .stage { animation: none; }
    }
  </style>
</head>

  // ================== FUNÇÃO DE REDIMENSIONAMENTO ==================
  function updateAlbumScale() {
    if (!bookWrapper) return;

    var tray = document.querySelector('.tray');
    var isTrayVisible = tray && tray.style.display !== 'none' && !document.body.classList.contains('modo-visualizacao');

    // No modo cliente (visualizador), a .stage é forçada a ficar "deitada"
    // via CSS (rotate 90° quando o aparelho está em pé). Isso troca, na
    // prática, o espaço disponível: a largura utilizável passa a ser a
    // altura da janela, e a altura utilizável passa a ser a largura da
    // janela. Detectamos isso perguntando ao navegador o estado real do
    // media query — nada aqui depende de JS de navegação/animação.
    var isForcedLandscape = false;
    if (modoVisualizacao) {
      isForcedLandscape = window.matchMedia('(orientation: portrait)').matches;
    }

    var availWidth = isForcedLandscape ? window.innerHeight : window.innerWidth;
    var availHeight = isForcedLandscape ? window.innerWidth : window.innerHeight;

    // Subtrai a altura do tray se visível (só existe fora do modo cliente)
    if (isTrayVisible && tray) {
      var trayHeight = tray.offsetHeight || 0;
      // considerando gap do stage (6px) + padding do tray (12+16) + margens
      var extraGap = 6 + 28; 
      availHeight = availHeight - trayHeight - extraGap;
    }

    // Margem de segurança: no visualizador do cliente é mínima (a tela
    // toda pertence ao álbum); na mesa de montagem mantém a folga original.
    var margin = modoVisualizacao ? 0.995 : 0.97;
    availWidth *= margin;
    availHeight *= margin;

    // 340x250 é o gabarito de UMA página. O livro agora exibe duas
    // páginas lado a lado (spread aberto), então a proporção do wrapper
    // passa a ser o dobro da largura de uma página.
    var pageRatio = 340 / 250;
    var ratio = pageRatio * 2;
    var largura, altura;

    if (availWidth / availHeight > ratio) {
      altura = availHeight;
      largura = altura * ratio;
    } else {
      largura = availWidth;
      altura = largura / ratio;
    }

    largura = Math.floor(largura);
    altura = Math.floor(altura);

    // Aplica dimensões ao wrapper (o spread inteiro)
    bookWrapper.style.width = largura + 'px';
    bookWrapper.style.height = altura + 'px';

    // Largura de UMA página (metade do spread) — usada para calibrar
    // perspectiva e botões na mesma proporção visual de antes.
    var pageWidth = largura / 2;

    // Ajusta a perspectiva proporcionalmente à largura de uma página (fator 6)
    var perspective = pageWidth * 6;
    bookWrapper.style.perspective = perspective + 'px';

    // Ajusta a posição e tamanho dos botões de navegação
    var btnSize = Math.min(pageWidth * 0.12, 46);
    btnSize = Math.max(btnSize, 34);
    var btnOffset = pageWidth * 0.12;
    btnOffset = Math.max(btnOffset, 20);

    prevBtn.style.width = btnSize + 'px';
    prevBtn.style.height = btnSize + 'px';
    prevBtn.style.left = (-btnOffset) + 'px';

    nextBtn.style.width = btnSize + 'px';
    nextBtn.style.height = btnSize + 'px';
    nextBtn.style.right = (-btnOffset) + 'px';

    // Ajusta tamanho das setas
    var arrowSize = btnSize * 0.25;
    var arrows = document.querySelectorAll('.nav-btn .arrow');
    arrows.forEach(function(arrow) {
      arrow.style.borderTopWidth = arrowSize + 'px';
      arrow.style.borderBottomWidth = arrowSize + 'px';
      if (arrow.parentElement.classList.contains('nav-prev')) {
        arrow.style.borderRightWidth = (arrowSize * 1.2) + 'px';
        arrow.style.marginRight = '-2px';
      } else {
        arrow.style.borderLeftWidth = (arrowSize * 1.2) + 'px';
        arrow.style.marginLeft = '-2px';
      }
    });
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ---------- Estrutura ----------
  function recalcStructure() {
    var n = albumData.paginas.length;
    var idx = 2 + n;
    if (idx % 2 === 0) {
      contracapaFaceIndex = idx + 1;
      totalFaces = contracapaFaceIndex + 1;
    } else {
      contracapaFaceIndex = idx;
      totalFaces = contracapaFaceIndex + 1;
    }
    totalLaminas = totalFaces / 2;
  }

  function getFaceLabel(faceIndex) {
    if (faceIndex === 0) return { label: 'Capa', num: null };
    if (faceIndex === 1) return { label: 'Blank', num: null };
    if (faceIndex === contracapaFaceIndex - 1 && contracapaFaceIndex % 2 === 1) {
      return { label: 'Blank', num: null };
    }
    if (faceIndex === contracapaFaceIndex) return { label: 'Contracapa', num: null };
    if (faceIndex > contracapaFaceIndex) return { label: 'Blank', num: null };
    var pageNum = faceIndex - 1;
    return { label: String(pageNum).padStart(2, '0'), num: pageNum };
  }

  function createFaceHtml(faceIndex) {
    var info = getFaceLabel(faceIndex);
    var foto = null;
    var bgColor = '#f0ede8';

    if (faceIndex === 0) {
      foto = albumData.capa;
    }
    else if (faceIndex === contracapaFaceIndex) {
      foto = albumData.contracapa;
    }
    else if (faceIndex > 1 && faceIndex < contracapaFaceIndex) {
      var pageIdx = faceIndex - 2;
      if (pageIdx >= 0 && pageIdx < albumData.paginas.length) {
        foto = albumData.paginas[pageIdx];
      }
    }

    var style = 'background-color:' + bgColor + ';';
    if (foto) {
      style += 'background-image:url(' + foto.dataUrl + ');background-size:cover;background-position:center;';
    }

    var numHtml = '';
    if (faceIndex > 1 && faceIndex < contracapaFaceIndex) {
      var numClass = 'plate-num' + (foto ? '' : ' blank');
      numHtml = '<span class="' + numClass + '">Nº ' + info.label + '</span>';
    }

    return '<div class="page-inner" style="' + style + '">' + numHtml + '</div>';
  }

  function blankFaceHtml() {
    return '<div class="page-inner" style="background:#e8e4dc;"></div>';
  }

  function buildPages() {
    bookEl.innerHTML = '';
    pages = [];
    for (var i = 0; i < totalLaminas; i++) {
      var page = document.createElement('div');
      page.className = 'page';
      var frontIndex = i * 2;
      var backIndex = i * 2 + 1;
      var frontHtml = (frontIndex < totalFaces) ? createFaceHtml(frontIndex) : blankFaceHtml();
      var backHtml = (backIndex < totalFaces) ? createFaceHtml(backIndex) : blankFaceHtml();
      page.innerHTML =
        '<div class="face front">' + frontHtml + '</div>' +
        '<div class="face back">' + backHtml + '</div>';
      page.style.zIndex = (totalLaminas * 2) - i;
      bookEl.appendChild(page);
      pages.push(page);
    }
  }

  function updateView(skipTransition) {
    var laminaAtual = Math.floor(currentFace / 2);
    var lado = currentFace % 2;
    for (var i = 0; i < totalLaminas; i++) {
      var page = pages[i];
      var rot = 0;
      var zIndex;
      if (i < laminaAtual) {
        rot = -180;
        zIndex = i;
      } else if (i === laminaAtual) {
        rot = (lado === 1) ? -180 : 0;
        zIndex = (rot === -180) ? i : (totalLaminas * 2) - i;
      } else {
        rot = 0;
        zIndex = (totalLaminas * 2) - i;
      }
      if (skipTransition) {
        page.style.transition = 'none';
      } else {
        page.style.transition = '';
      }
      page.style.transform = 'rotateY(' + rot + 'deg)';
      page.style.zIndex = zIndex;
      if (skipTransition) {
        void page.offsetHeight;
        page.style.transition = '';
      }
    }
    updateCounter();
    updateButtons();
  }

  function updateCounter() {
    var info = getFaceLabel(currentFace);
    if (currentFace === 0) {
      counterEl.textContent = 'Capa';
    } else if (currentFace === 1) {
      counterEl.textContent = 'Blank';

    } else if (currentFace === contracapaFaceIndex) {
      counterEl.textContent = 'Contracapa';
    } else if (currentFace > contracapaFaceIndex) {

    } else {
      counterEl.textContent = info.label + ' / ' + String(albumData.paginas.length).padStart(2, '0');
    }
  }

  function updateButtons() {
    prevBtn.disabled = currentFace === 0;
    nextBtn.disabled = currentFace === contracapaFaceIndex;

  function updateTrayHint() {

  function rebuildAlbum() {

  function gerarTokenCurto() {
    var chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    var rnd = new Uint32Array(10);
    crypto.getRandomValues(rnd);
    var out = '';
    for (var i = 0; i < 10; i++) { out += chars[rnd[i] % chars.length]; }
    return out;
  }

  // ----- navegação -----
  function next() {
    if (isAnimating) return;
    var fromFace = currentFace;
    var toFace = fromFace + 1;
    if (toFace === 1) toFace = 2;
    if (toFace === contracapaFaceIndex - 1 && contracapaFaceIndex % 2 === 1) {
      toFace = contracapaFaceIndex;
    }
    if (toFace > contracapaFaceIndex) return;

    var fromLamina = Math.floor(fromFace / 2);
    var fromLado = fromFace % 2;

    if (fromLado === 0) {
      isAnimating = true;
      currentFace = toFace;
      updateCounter();
      updateButtons();
      var page = pages[fromLamina];
      page.style.transition = 'transform 0.95s cubic-bezier(.64,.06,.34,1)';
      page.style.transform = 'rotateY(-180deg)';
      var listener = function(e) {
        if (e.propertyName !== 'transform') return;
        page.removeEventListener('transitionend', listener);
        page.style.zIndex = fromLamina;
        updateView(true);
        isAnimating = false;
      };
      page.addEventListener('transitionend', listener);
    } else {
      currentFace = toFace;
      updateView(false);
      updateCounter();
      updateButtons();
    }
  }

  function prev() {
    if (isAnimating) return;
    var fromFace = currentFace;
    var toFace = fromFace - 1;
    if (toFace === 1) toFace = 0;
    if (toFace < 0) return;

    var fromLamina = Math.floor(fromFace / 2);
    var fromLado = fromFace % 2;

    if (fromLado === 1) {
      isAnimating = true;
      currentFace = toFace;
      updateCounter();
      updateButtons();
      var page = pages[fromLamina];
      page.style.transition = 'transform 0.95s cubic-bezier(.64,.06,.34,1)';
      page.style.transform = 'rotateY(0deg)';
      var listener = function(e) {
        if (e.propertyName !== 'transform') return;
        page.removeEventListener('transitionend', listener);
        page.style.zIndex = (totalLaminas * 2) - fromLamina;
        updateView(true);
        isAnimating = false;
      };
      page.addEventListener('transitionend', listener);
    } else {
      currentFace = toFace;
      updateView(false);
      updateCounter();
      updateButtons();
    }
  }

  // ================== UPLOAD ==================
  function readImageFile(file) {
    return new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload = function() {
        var img = new Image();
        img.onload = function() {
          var maxDim = 1600;
          var scale = Math.min(1, maxDim / Math.max(img.width, img.height));
          var canvas = document.createElement('canvas');
          canvas.width = Math.round(img.width * scale);
          canvas.height = Math.round(img.height * scale);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve({ name: file.name, dataUrl: canvas.toDataURL('image/jpeg', 0.85) });
        };
        img.onerror = function() { reject(new Error('Não foi possível abrir "' + file.name + '".')); };
        img.src = reader.result;
      };
      reader.onerror = function() { reject(new Error('Falha ao ler o arquivo "' + file.name + '".')); };
      reader.readAsDataURL(file);
    });
  }

  function sortFilesByName(fileList) {
    return Array.prototype.slice.call(fileList).sort(function(a, b) {
      return a.name.localeCompare(b.name, 'pt-BR', { numeric: true, sensitivity: 'base' });
    });
  }

  function onlyImages(fileList) {
    return Array.prototype.slice.call(fileList).filter(function(f) { return f.type.indexOf('image/') === 0; });
  }

      '</svg>' +
      '<span class="dz-text">clique ou arraste a foto</span>';
  }

  // Páginas

  function renderPaginasFilmstrip() {
    paginasCount.textContent = albumData.paginas.length + (albumData.paginas.length === 1 ? ' foto' : ' fotos');
    paginasFilmstrip.innerHTML = '';
    albumData.paginas.forEach(function(foto, idx) {

      paginasFilmstrip.appendChild(frame);

  function handlePaginasFiles(fileList) {
    var imgs = sortFilesByName(onlyImages(fileList));
    if (!imgs.length) return;
    Promise.all(imgs.map(function(file) {
      return readImageFile(file).then(
        function(foto) { return { ok: true, foto: foto }; },
        function(err) { return { ok: false, erro: err.message }; }
      );
    })).then(function(results) {
      var erros = [];
      results.forEach(function(r) {
        if (r.ok) { albumData.paginas.push(r.foto); } else { erros.push(r.erro); }
      });
      renderPaginasFilmstrip();
      rebuildAlbum();
      if (erros.length) alert(erros.join('\n'));
    });
  }

  // Gerar link do cliente

  generateLinkBtn.addEventListener('click', function() {
    if (!albumData.capa && !albumData.paginas.length && !albumData.contracapa) {
      linkStatus.className = 'link-status error';
      linkStatus.textContent = 'Adicione ao menos uma foto antes de gerar o link.';
      return;

    generateLinkBtn.disabled = true;
    linkStatus.className = 'link-status';
    linkStatus.textContent = 'Gerando link…';
    var token = gerarTokenCurto();
    dbClient.from('album_apresentacoes').insert({
      token: token,
      album_data: { capa: albumData.capa, paginas: albumData.paginas, contracapa: albumData.contracapa }

      generateLinkBtn.disabled = false;
      if (res.error) {
        linkStatus.className = 'link-status error';
        linkStatus.textContent = 'Erro ao gerar link: ' + res.error.message;
        return;

      var url = location.origin + location.pathname + '?a=' + token;
      linkOutput.value = url;
      linkResult.hidden = false;
      linkStatus.textContent = 'Link gerado — cada álbum novo gera um link novo, o anterior continua intacto.';
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(function() {

      navigator.clipboard.writeText(linkOutput.value).then(function() {
        linkStatus.textContent = 'Link copiado.';
      });
    } else {
      document.execCommand('copy');
      linkStatus.textContent = 'Link copiado.';
    }
  });

  // ================== INICIALIZAÇÃO DO ÁLBUM/EDITOR ==================
  // (idêntica à de antes — só que agora embrulhada numa função para poder
  // ser chamada depois do login, no modo editor)
  var appJaIniciado = false;
  function iniciarApp() {
    if (appJaIniciado) return;
    appJaIniciado = true;

    recalcStructure();
    buildPages();
    updateView(true);
    updateTrayHint();
    if (modoVisualizacao) { carregarAlbumCliente(albumToken); }

    // Eventos de redimensionamento
    window.addEventListener('load', function() {
      updateAlbumScale();
    });
    window.addEventListener('resize', updateAlbumScale);
    window.addEventListener('orientationchange', function() {
      setTimeout(updateAlbumScale, 150);
    });
    document.addEventListener('fullscreenchange', updateAlbumScale);

    // Navegação
    bookEl.addEventListener('click', function(e) {
      var rect = bookEl.getBoundingClientRect();
      var x = e.clientX - rect.left;
      if (x > rect.width / 2) next(); else prev();
    });
    prevBtn.addEventListener('click', prev);
    nextBtn.addEventListener('click', next);
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight') next();
      else if (e.key === 'ArrowLeft') prev();
    });
    var touchStartX = 0;
    bookEl.addEventListener('touchstart', function(e) {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    bookEl.addEventListener('touchend', function(e) {
      var dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50) {
        if (dx < 0) next(); else prev();
      }
    }, { passive: true });

    // Força um recalque inicial
    setTimeout(updateAlbumScale, 50);
  }

  // ================== LOGIN DO EDITOR (Supabase Auth) ==================
  // O link do cliente (?a=token) nunca passa por aqui: inicia direto.
  // O editor (Mesa de Montagem) só libera depois de autenticar com o
  // usuário/senha já cadastrado no Supabase Auth do fotógrafo.
  if (modoVisualizacao) {
    iniciarApp();
  } else {
    var loginGate = document.getElementById('loginGate');
    var loginForm = document.getElementById('loginForm');
    var loginEmail = document.getElementById('loginEmail');
    var loginPassword = document.getElementById('loginPassword');
    var loginError = document.getElementById('loginError');
    var loginBtn = document.getElementById('loginBtn');
    var logoutBtn = document.getElementById('logoutBtn');

    function liberarEditor() {
      document.body.classList.remove('aguardando-login');
      iniciarApp();
    }

    // Já tem sessão salva (login anterior)? Entra direto, sem pedir de novo.
    dbClient.auth.getSession().then(function(res) {
      if (res.data && res.data.session) {
        liberarEditor();
      }
    });

    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      loginBtn.disabled = true;
      loginBtn.textContent = 'Entrando…';
      loginError.textContent = '';
      dbClient.auth.signInWithPassword({
        email: loginEmail.value.trim(),
        password: loginPassword.value
      }).then(function(res) {
        loginBtn.disabled = false;
        loginBtn.textContent = '→ Entrar';
        if (res.error) {
          loginError.textContent = 'E-mail ou senha inválidos.';
          return;
        }
        liberarEditor();
      }).catch(function() {
        loginBtn.disabled = false;
        loginBtn.textContent = '→ Entrar';
        loginError.textContent = 'Não foi possível entrar agora. Tente novamente.';
      });
    });

    logoutBtn.addEventListener('click', function() {
      dbClient.auth.signOut().then(function() {
        loginEmail.value = '';
        loginPassword.value = '';
        loginError.textContent = '';
        location.reload();
      });
    });
  }
})();
</script>
</body>
</html>
